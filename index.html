<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>田野里的浪漫交响</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <h1>金色的旋律</h1>
            <p>油菜花开时的浪漫音频</p>
        </header>

        <div class="player-container">
            <div class="song-info">
                <h2 id="current-title">请选择歌曲</h2>
            </div>
            
            <div class="controls">
                <button id="prev">上一个</button>
                <button id="play-pause">播放</button>
                <button id="next">下一个</button>
            </div>
            
            <audio id="audio-player" src=""></audio>
        </div>

        <ul class="playlist" id="playlist">
            <li data-src="music/熱河相信未來跨年現場.mp3">第一首：熱河相信未來跨年現場</li>
            <li data-src="music/關於鄭州的記憶.mp3">第二首：關於鄭州的記憶</li>
            <li data-src="music/你離開了南京，從此沒有人和我說話.mp3">第三首：你離開了南京，從此沒有人和我說話</li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
